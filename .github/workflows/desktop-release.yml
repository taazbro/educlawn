name: desktop-release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "desktop/**"
      - "frontend/**"
      - ".github/workflows/desktop-release.yml"

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: civic-project-studio-macos
            npm_script: dist:mac
            artifact_paths: |
              desktop/release/*.dmg
              desktop/release/*.zip
              desktop/release/latest*.yml
          - os: windows-latest
            artifact_name: civic-project-studio-windows
            npm_script: dist:win
            artifact_paths: |
              desktop/release/*.exe
              desktop/release/latest*.yml
          - os: ubuntu-latest
            artifact_name: civic-project-studio-linux
            npm_script: dist:linux
            artifact_paths: |
              desktop/release/*.AppImage
              desktop/release/*.deb
              desktop/release/latest*.yml

    runs-on: ${{ matrix.os }}
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --locked

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build desktop release
        working-directory: desktop
        run: npm run ${{ matrix.npm_script }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
