services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /workspace
    command: sh -lc "cd backend && uv sync && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      MLK_DB_PATH: /workspace/backend/data_artifacts/mlk_intelligence.sqlite3
      MLK_WORKFLOW_SCHEDULER_ENABLED: "true"
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    working_dir: /workspace
    command: sh -lc "cd frontend && npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - .:/workspace
